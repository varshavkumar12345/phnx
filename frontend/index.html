<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PHNX — Public Threads</title>
  <meta name="description" content="PHNX is a public threads platform where every voice is heard. Read all threads freely, sign in to post." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- ── AUTH MODAL (dismissable) ────────────────────────────────────────── -->
  <div id="auth-modal" class="auth-modal hidden" onclick="closeModalOnBackdrop(event)">
    <div class="auth-container">

      <!-- Close button -->
      <button class="auth-close" onclick="closeAuthModal()" title="Close">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/>
        </svg>
      </button>

      <!-- Brand -->
      <div class="auth-brand">
        <div class="brand-logo">
          <svg viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M24 4C13 4 4 13 4 24C4 35 13 44 24 44C35 44 44 35 44 24C44 13 35 4 24 4Z" fill="url(#grad1)"/>
            <path d="M16 18C16 14.7 18.7 12 22 12H26C29.3 12 32 14.7 32 18V20C32 23.3 29.3 26 26 26H24L20 36H16L20 26C17.8 25.3 16 22.5 16 20V18Z" fill="white" opacity="0.9"/>
            <defs>
              <linearGradient id="grad1" x1="4" y1="4" x2="44" y2="44" gradientUnits="userSpaceOnUse">
                <stop stop-color="#a855f7"/>
                <stop offset="1" stop-color="#ec4899"/>
              </linearGradient>
            </defs>
          </svg>
        </div>
        <h2 class="brand-name">PHNX</h2>
        <p class="brand-tagline" id="auth-tagline">Sign in to post a thread</p>
      </div>

      <!-- Tab Switcher -->
      <div class="auth-tabs">
        <button id="tab-login" class="auth-tab active" onclick="switchTab('login')">Sign In</button>
        <button id="tab-register" class="auth-tab" onclick="switchTab('register')">Create Account</button>
      </div>

      <!-- Login Form -->
      <form id="login-form" class="auth-form" onsubmit="handleLogin(event)">
        <div class="form-group">
          <label for="login-username">Username</label>
          <input id="login-username" type="text" placeholder="your_username" autocomplete="username" required />
        </div>
        <div class="form-group">
          <label for="login-password">Password</label>
          <input id="login-password" type="password" placeholder="••••••••" autocomplete="current-password" required />
        </div>
        <div id="login-error" class="form-error hidden"></div>
        <button type="submit" id="login-btn" class="btn-primary">
          <span>Sign In</span>
          <div class="btn-spinner hidden"></div>
        </button>
      </form>

      <!-- Register Form -->
      <form id="register-form" class="auth-form hidden" onsubmit="handleRegister(event)">
        <div class="form-group">
          <label for="reg-username">Username</label>
          <input id="reg-username" type="text" placeholder="choose_a_username" autocomplete="username" required />
        </div>
        <div class="form-group">
          <label for="reg-email">Email</label>
          <input id="reg-email" type="email" placeholder="you@example.com" autocomplete="email" required />
        </div>
        <div class="form-group">
          <label for="reg-password">Password</label>
          <input id="reg-password" type="password" placeholder="min. 6 characters" autocomplete="new-password" required />
        </div>
        <div id="register-error" class="form-error hidden"></div>
        <button type="submit" id="register-btn" class="btn-primary">
          <span>Create Account</span>
          <div class="btn-spinner hidden"></div>
        </button>
      </form>

    </div>
  </div>

  <!-- ── MAIN APP (always visible) ────────────────────────────────────────── -->
  <div id="app" class="app">

    <!-- Sidebar -->
    <aside class="sidebar">
      <div class="sidebar-brand">
        <div class="brand-logo small">
          <svg viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M24 4C13 4 4 13 4 24C4 35 13 44 24 44C35 44 44 35 44 24C44 13 35 4 24 4Z" fill="url(#grad2)"/>
            <path d="M16 18C16 14.7 18.7 12 22 12H26C29.3 12 32 14.7 32 18V20C32 23.3 29.3 26 26 26H24L20 36H16L20 26C17.8 25.3 16 22.5 16 20V18Z" fill="white" opacity="0.9"/>
            <defs>
              <linearGradient id="grad2" x1="4" y1="4" x2="44" y2="44" gradientUnits="userSpaceOnUse">
                <stop stop-color="#a855f7"/>
                <stop offset="1" stop-color="#ec4899"/>
              </linearGradient>
            </defs>
          </svg>
        </div>
        <span class="brand-name small">PHNX</span>
      </div>

      <nav class="sidebar-nav">
        <a href="#" class="nav-item active" id="nav-feed">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor"><path d="M11.47 3.84a.75.75 0 011.06 0l8.69 8.69a.75.75 0 101.06-1.06l-8.689-8.69a2.25 2.25 0 00-3.182 0l-8.69 8.69a.75.75 0 001.061 1.06l8.69-8.69z"/><path d="M12 5.432l8.159 8.159c.03.03.06.058.091.086v6.198c0 1.035-.84 1.875-1.875 1.875H15a.75.75 0 01-.75-.75v-4.5a.75.75 0 00-.75-.75h-3a.75.75 0 00-.75.75V21a.75.75 0 01-.75.75H5.625a1.875 1.875 0 01-1.875-1.875v-6.198a2.29 2.29 0 00.091-.086L12 5.43z"/></svg>
          <span>Home</span>
        </a>
        <!-- Profile — only shown when logged in -->
        <a href="#" class="nav-item hidden" id="nav-profile">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor"><path fill-rule="evenodd" d="M7.5 6a4.5 4.5 0 119 0 4.5 4.5 0 01-9 0zM3.751 20.105a8.25 8.25 0 0116.498 0 .75.75 0 01-.437.695A18.683 18.683 0 0112 22.5c-2.786 0-5.433-.608-7.812-1.7a.75.75 0 01-.437-.695z" clip-rule="evenodd"/></svg>
          <span>Profile</span>
        </a>
      </nav>

      <!-- Logged-in user footer -->
      <div class="sidebar-user hidden" id="sidebar-user">
        <img id="sidebar-avatar" src="" alt="avatar" class="sidebar-avatar" />
        <div class="sidebar-user-info">
          <p id="sidebar-username" class="sidebar-username"></p>
          <p class="sidebar-role">Member</p>
        </div>
        <button id="logout-btn" class="btn-logout" onclick="handleLogout()" title="Sign out">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor"><path fill-rule="evenodd" d="M7.5 3.75A1.5 1.5 0 006 5.25v13.5a1.5 1.5 0 001.5 1.5h6a1.5 1.5 0 001.5-1.5V15a.75.75 0 011.5 0v3.75a3 3 0 01-3 3h-6a3 3 0 01-3-3V5.25a3 3 0 013-3h6a3 3 0 013 3V9A.75.75 0 0115 9V5.25a1.5 1.5 0 00-1.5-1.5h-6zm10.72 4.72a.75.75 0 011.06 0l3 3a.75.75 0 010 1.06l-3 3a.75.75 0 11-1.06-1.06l1.72-1.72H9a.75.75 0 010-1.5h10.94l-1.72-1.72a.75.75 0 010-1.06z" clip-rule="evenodd"/></svg>
        </button>
      </div>

      <!-- Guest footer — sign in button -->
      <div class="sidebar-guest" id="sidebar-guest">
        <button class="btn-signin-sidebar" onclick="openAuthModal('login')">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M15.75 9V5.25A2.25 2.25 0 0013.5 3h-6a2.25 2.25 0 00-2.25 2.25v13.5A2.25 2.25 0 007.5 21h6a2.25 2.25 0 002.25-2.25V15m3 0l3-3m0 0l-3-3m3 3H9"/>
          </svg>
          <span>Sign In</span>
        </button>
      </div>
    </aside>

    <!-- Main Content -->
    <main class="main-content">

      <!-- Feed View -->
      <section id="view-feed" class="view">
        <div class="feed-header">
          <h2 class="feed-title">Home</h2>
          <div class="live-badge">
            <span class="live-dot"></span>
            <span>Live</span>
          </div>
        </div>

        <!-- Compose Box — shown when logged in -->
        <div class="compose-box hidden" id="compose-box">
          <img id="compose-avatar" src="" alt="avatar" class="compose-avatar" />
          <div class="compose-input-area">
            <textarea
              id="compose-input"
              placeholder="What's on your mind?"
              maxlength="500"
              rows="1"
              oninput="autoResize(this); updateCharCount(this)"
            ></textarea>
            <div class="compose-footer">
              <span id="char-count" class="char-count">500</span>
              <button id="post-btn" class="btn-post" onclick="postThread()">
                <span>Post</span>
              </button>
            </div>
          </div>
        </div>

        <!-- Guest CTA — shown when NOT logged in -->
        <div class="guest-cta" id="guest-cta">
          <p>Join the conversation</p>
          <div class="guest-cta-actions">
            <button class="btn-cta-primary" onclick="openAuthModal('register')">Create account</button>
            <button class="btn-cta-secondary" onclick="openAuthModal('login')">Sign in</button>
          </div>
        </div>

        <div class="feed-divider"></div>

        <!-- Thread Feed -->
        <div id="threads-feed" class="threads-feed">
          <div class="loading-state" id="feed-loading">
            <div class="spinner"></div>
            <p>Loading threads…</p>
          </div>
        </div>

        <div id="load-more-wrap" class="load-more-wrap hidden">
          <button class="btn-load-more" onclick="loadMore()">Load more</button>
        </div>
      </section>

      <!-- Profile View -->
      <section id="view-profile" class="view hidden">
        <div class="profile-header">
          <div class="profile-avatar-wrap">
            <img id="profile-avatar" src="" alt="avatar" class="profile-avatar" />
            <div class="profile-avatar-ring"></div>
          </div>
          <div class="profile-info">
            <h2 id="profile-username" class="profile-username"></h2>
            <p class="profile-handle" id="profile-handle"></p>
            <div class="profile-stats">
              <div class="stat">
                <span id="stat-threads" class="stat-value">0</span>
                <span class="stat-label">Threads</span>
              </div>
            </div>
          </div>
        </div>
        <div class="feed-divider"></div>
        <div id="profile-threads" class="threads-feed"></div>
      </section>

    </main>
  </div>

  <!-- ── TOAST NOTIFICATION ────────────────────────────────────────────────── -->
  <div id="toast" class="toast hidden">
    <span id="toast-message"></span>
  </div>

  <script src="app.js"></script>
</body>
</html>
